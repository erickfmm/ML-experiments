<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ML Experiments{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/monokai.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">🧪 ML Experiments</div>
        <div class="nav-links">
            <a href="/" class="{% if request.path == '/' %}active{% endif %}">📁 Test Files</a>
            <a href="/autoencoder" class="{% if request.path == '/autoencoder' %}active{% endif %}">🧠 Autoencoder</a>
            <a href="/clustering" class="{% if request.path == '/clustering' %}active{% endif %}">🔵 Clustering</a>
            <a href="/confusion-matrices" class="{% if request.path == '/confusion-matrices' %}active{% endif %}">📊 Confusion</a>
            <a href="/image-classifier" class="{% if request.path == '/image-classifier' %}active{% endif %}">🖼️ CNN</a>
            <a href="/gan" class="{% if request.path == '/gan' %}active{% endif %}">🎨 GAN</a>
            <a href="/sentiment" class="{% if request.path == '/sentiment' %}active{% endif %}">💬 Sentiment</a>
            <a href="/tfidf" class="{% if request.path == '/tfidf' %}active{% endif %}">📈 TF-IDF</a>
            <a href="/topic-modeling" class="{% if request.path == '/topic-modeling' %}active{% endif %}">📋 Topic Model</a>
            <a href="/psychoacoustic" class="{% if request.path == '/psychoacoustic' %}active{% endif %}">🎵 Psychoacoustic</a>
            <a href="/butterfly" class="{% if request.path == '/butterfly' %}active{% endif %}">🦋 Butterfly</a>
            <a href="/datasets" class="{% if request.path == '/datasets' %}active{% endif %}">📦 Datasets</a>
            <a href="/settings" class="{% if request.path == '/settings' %}active{% endif %}">⚙️ Settings</a>
        </div>
    </nav>
    <main class="content">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
