{% extends "base.html" %}
{% block title %}Test Files - ML Experiments{% endblock %}
{% block head %}
<style>
    .main-layout {
        display: grid;
        grid-template-columns: 220px 1fr 1fr;
        gap: 12px;
        height: calc(100vh - 80px);
    }
    .file-panel {
        display: flex;
        flex-direction: column;
        gap: 6px;
        overflow-y: auto;
        padding-right: 6px;
    }
    .file-btn {
        display: block;
        width: 100%;
        text-align: left;
        padding: 8px 12px;
        border: 1px solid #444;
        background: #2b2b2b;
        color: #e0e0e0;
        border-radius: 4px;
        cursor: pointer;
        font-size: 13px;
        transition: background 0.15s;
    }
    .file-btn:hover { background: #3a3a3a; }
    .file-btn.active { background: #1a6baa; border-color: #1a6baa; }
    .editor-panel, .output-panel {
        display: flex;
        flex-direction: column;
        border: 1px solid #444;
        border-radius: 6px;
        overflow: hidden;
    }
    .panel-header {
        background: #333;
        padding: 8px 12px;
        font-weight: bold;
        color: #ccc;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }
    .panel-header .actions { display: flex; gap: 6px; }
    .CodeMirror {
        height: 100% !important;
        font-size: 14px;
    }
    .editor-wrapper {
        flex: 1;
        overflow: hidden;
    }
    .output-area {
        flex: 1;
        background: #1a1a1a;
        color: #0f0;
        font-family: 'Consolas', 'Courier New', monospace;
        font-size: 13px;
        padding: 10px;
        overflow-y: auto;
        white-space: pre-wrap;
        word-break: break-all;
    }
    .btn {
        padding: 5px 14px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 600;
        transition: background 0.15s;
    }
    .btn-run { background: #28a745; color: #fff; }
    .btn-run:hover { background: #218838; }
    .btn-run.running { background: #dc3545; }
    .btn-run.running:hover { background: #c82333; }
    .btn-stop { background: #dc3545; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 600; padding: 5px 14px; transition: background 0.15s; display: none; }
    .btn-stop:hover { background: #c82333; }
    .btn-stop.visible { display: inline-block; }
    .btn-save { background: #007bff; color: #fff; }
    .btn-save:hover { background: #0069d9; }
    .btn-clear { background: #6c757d; color: #fff; }
    .btn-clear:hover { background: #5a6268; }
    .status-dot {
        display: inline-block;
        width: 8px; height: 8px;
        border-radius: 50%;
        margin-right: 6px;
    }
    .status-dot.idle { background: #6c757d; }
    .status-dot.running { background: #ffc107; animation: pulse 1s infinite; }
    .status-dot.done { background: #28a745; }
    .status-dot.error { background: #dc3545; }
    @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
    }
</style>
{% endblock %}

{% block content %}
<div class="main-layout">
    <!-- File List -->
    <div class="file-panel">
        <div class="panel-header">
            <span>📁 Test Files</span>
        </div>
        <div id="file-list"></div>
    </div>

    <!-- Code Editor -->
    <div class="editor-panel">
        <div class="panel-header">
            <span id="editor-title">📄 Select a file</span>
            <div class="actions">
                <button class="btn btn-save" onclick="saveFile()">💾 Save</button>
            </div>
        </div>
        <div class="editor-wrapper">
            <textarea id="code-editor"></textarea>
        </div>
    </div>

    <!-- Output Terminal -->
    <div class="output-panel">
        <div class="panel-header">
            <span>
                <span class="status-dot idle" id="status-dot"></span>
                Terminal
            </span>
            <div class="actions">
                <button class="btn btn-clear" onclick="clearOutput()">🗑️ Clear</button>
                <button class="btn btn-stop" id="stop-btn" onclick="stopRun()">⏹ Stop</button>
                <button class="btn btn-run" id="run-btn" onclick="toggleRun()">▶ Run</button>
            </div>
        </div>
        <div class="output-area" id="terminal-output">Ready. Select a file and click Run.</div>
    </div>
</div>

<script src="/static/js/editor.js"></script>
{% endblock %}
